<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FreeFilm - Xem phim bộ, phim lẻ, hoạt hình online chất lượng cao, cập nhật liên tục mỗi ngày, giao diện siêu mượt và không giật lag.">
    <meta name="keywords" content="xem phim, phim online, phim moi, freefilm, phim hay, vietsub, phim lậu không quảng cáo, phim chiếu rạp chuẩn hd, phim bộ hàn quốc mới nhất, xem phim không giật lag, motchill, phim lẻ mới nhất, phim hoạt hình online, phim tv shows, xem phim miễn phí">
    <meta name="robots" content="index, follow"> <meta property="og:title" content="FreeFilm - Huyền Thoại Phim Lậu">
    <meta property="og:description" content="Xem phim online miễn phí tốc độ cao, giao diện không quảng cáo rác!">
    <meta property="og:image" content="https://freefilm.pp.ua/logo.png"> <meta property="og:url" content="https://freefilm.pp.ua/">
    <title>FreeFilm - Huyền Thoại Phim Lậu</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://img.ophim.live">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

    <div id="siteIntro" class="site-intro">
        <video id="introVideo" class="intro-video" autoplay muted playsinline>
            <source media="(max-width: 480px)" src="intro_m.mp4" type="video/mp4">
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>

            <div class="nav-pill" id="navPill">
                <nav class="nav-links" id="navLinks">
                    <span class="nav-item" data-slug="phim-bo">Phim Bộ</span>
                    <span class="nav-item" data-slug="phim-le">Phim Lẻ</span>
                    <span class="nav-item" data-slug="hoat-hinh">Hoạt Hình</span>
                    <span class="nav-item" data-slug="tv-shows">TV Shows</span>
                </nav>
                
                <div class="search-box" id="searchBox">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    <button id="closeSearchBtn" class="close-search">✕</button>
                </div>

                <button class="search-toggle-btn" id="searchToggleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>

            <div class="header-right"></div>
        </div>
    </header>

    <main class="main-container">
        
        <section class="hero-section">
            <div class="hero-grid" id="heroGrid"></div>
        </section>

        <section class="movies-section">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="sectionTitle">Tớ vừa chôm về</h2>
                <button id="openFilterBtn" class="page-btn" style="padding: 8px 15px; font-size: 14px; display: flex; gap: 8px; align-items: center; margin: 0; border-radius: 20px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Bộ Lọc
                </button>
            </div>            
            <div class="movies-grid" id="movieGrid"></div>
            <div class="pagination" id="pagination"></div>
        </section>

        <section class="genres-section">
            <div class="genres-scroll" id="countriesScroll"></div>
            <div class="genres-scroll" id="genresScroll"></div>
        </section>

    </main>

    <div id="filterModal" class="filter-modal">
        <div class="filter-modal-content">
            <button id="closeFilterBtn" class="close-modal-btn">✕</button>
            <h2 style="margin-bottom: 25px; color: #fbcbdf; text-align: center; font-weight: 800;">Khám Phá Phim</h2>
            
            <div class="filter-group">
                <h4 class="filter-group-title">🎬 Định dạng</h4>
                <div id="modalTypes" class="filter-grid"></div>
            </div>

            <div class="filter-group">
                <h4 class="filter-group-title">🎭 Thể loại</h4>
                <div id="modalGenres" class="filter-grid"></div>
            </div>

            <div class="filter-group" style="margin-bottom: 0;">
                <h4 class="filter-group-title">🌍 Quốc gia</h4>
                <div id="modalCountries" class="filter-grid"></div>
            </div>

            <div class="modal-footer" style="text-align: center; margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;">
                <button id="btnExecuteFilter" class="ep-btn.active" style="width: 100%; padding: 12px; font-size: 16px; border-radius: 12px;">🔍 Lọc Phim</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>

    <footer class="main-footer">
    <div class="footer-content">
        <p>&copy; 2026 Duc <span class="heart">💖</span> Ngoc. All rights reserved.</p>
    </div>
    </footer>
    
</body>
</html>
