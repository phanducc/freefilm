<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm v0.0.1 - Chào Mừng</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        
        <div class="sidebar-wrapper">
            <a href="index.html" class="top-logo">
                <img src="logo.png" alt="FreeFilm" class="logo-img" onerror="this.outerHTML='<h1 class=\'logo-text\'>FREEFILM</h1>'">
            </a>
            
            <aside class="left-dock">
                <div class="dock-menu">
                    <div class="dock-btn active" id="navHome" title="Trang Chủ">🏠</div>
                    <div class="dock-btn" id="toggleRightPanel" title="Diễn Viên & Yêu Thích">⭐</div>
                </div>
            </aside>
        </div>
        
        <main class="main-content">
            <header class="top-header">
                
                <div class="nav-and-search" id="navAndSearch">
                    
                    <nav class="categories-nav" id="categoriesNav">
                        <span class="cat-link">Phim Bộ</span>
                        <span class="cat-link">Phim Lẻ</span>
                        <span class="cat-link">Hoạt Hình</span>
                        <span class="cat-link">TV Show</span>
                    </nav>
                    
                    <div class="header-search-container">
                        <button id="searchBtn" class="search-btn">🔍</button>
                        
                        <div class="search-input-overlay" id="searchInputOverlay">
                            <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                            <button id="closeSearch" class="close-search-btn">✕</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                
                <section class="section">
                    <h2 class="section-title ff-glow">🔥 Phim nổi bật hôm nay</h2>
                    <div class="prominent-grid" id="random-prominent-grid">
                        <span class="actor-tag">Đang tải dữ liệu...</span>
                    </div>
                </section>
                
                <section class="section">
                    <h2 class="section-subtitle">🏷️ Toàn bộ thể loại</h2>
                    <div class="genres-pills" id="genreContainer">
                        <span class="actor-tag">Đang tải dữ liệu...</span>
                    </div>
                </section>

                <section class="section" style="margin-top: 40px; border-top: 2px dashed #333; padding-top: 30px; background: transparent;">
                    <h2 class="section-title ff-glow">📅 Phim mới cập nhật</h2>
                    
                    <div class="ff-grid" id="movie-grid"></div>
                    
                    <div class="pagination" id="pagination"></div>
                </section>
                
            </div>
        </main>

        <aside class="right-panel">
            
            <div class="right-section ratings-section">
                <h3 class="right-title">⭐ Đánh giá</h3>
                <div class="ratings-box ff-glow">
                    <span class="ff-rank" style="font-size: 30px;">#1</span>
                    <div class="tmdb-rating">
                        <p class="tag-tmdb" style="font-size: 16px;">★ 9.2</p>
                        <p style="font-size: 11px; color: #aaa;">Based on Ophim</p>
                    </div>
                </div>
            </div>

            <div class="right-section trailer-section">
                <h3 class="right-title">🎬 Trailers</h3>
                <div class="trailer-box ff-glow">
                    <img src="" style="width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px;">
                    <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; color: #fff; font-size: 40px;">▶️</div>
                </div>
            </div>

            <div class="right-section cast-section">
                <h3 class="right-title">🎭 Diễn viên</h3>
                <div id="actorsList" class="actors-list">
                    <span class="actor-tag">Đang tải...</span>
                </div>
            </div>
            
        </aside>  
    </div>

    <script src="app.js"></script>
</body>
</html>
