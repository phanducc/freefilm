<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm - Cinematic UI</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>

            <div class="nav-pill" id="navPill">
                <nav class="nav-links" id="navLinks">
                    <span class="nav-item" data-slug="phim-bo">Phim Bộ</span>
                    <span class="nav-item" data-slug="phim-le">Phim Lẻ</span>
                    <span class="nav-item" data-slug="hoat-hinh">Hoạt Hình</span>
                    <span class="nav-item" data-slug="tv-shows">TV Shows</span>
                </nav>
                
                <div class="search-box" id="searchBox">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    <button id="closeSearchBtn" class="close-search">✕</button>
                </div>

                <button class="search-toggle-btn" id="searchToggleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>

            <div class="header-right"></div>
        </div>
    </header>

    <main class="main-container">
        
        <section class="hero-section">
            <div class="hero-grid" id="heroGrid"></div>
        </section>

        <section class="genres-section">
            <div class="genres-scroll" id="genresScroll"></div>
        </section>

        <section class="movies-section">
            <div class="section-header">
                <h2 id="sectionTitle">Phim mới cập nhật</h2>
            </div>
            
            <div class="movies-grid" id="movieGrid"></div>
            
            <div class="pagination" id="pagination"></div>
        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
