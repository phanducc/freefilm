<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm v0.0.1 - Glass Cinematic</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>

            <div class="nav-pill-container" id="navPillContainer">
                
                <nav class="nav-links" id="navLinks">
                    <span class="nav-item">Phim Bộ</span>
                    <span class="nav-item">Phim Lẻ</span>
                    <span class="nav-item">Hoạt Hình</span>
                    <span class="nav-item">TV Shows</span>
                </nav>
                
                <div class="search-overlay" id="searchOverlay">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    <button id="closeSearch" class="close-search-btn">✕</button>
                </div>

                <button class="search-toggle-btn glass-btn" id="searchBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>

            <div class="header-right">
                <button class="favorite-btn glass-btn" id="toggleRightPanel" title="Yêu thích/Diễn viên">⭐</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        
        <section class="section">
            <h2 class="section-title ff-glow">🔥 Phim nổi bật hôm nay</h2>
            <div class="hero-grid" id="random-prominent-grid">
                </div>
        </section>

        <section class="section genres-section">
            <h2 class="section-subtitle">🏷️ Toàn bộ thể loại</h2>
            <div class="genres-pills-scroll" id="genreContainer">
                </div>
        </section>

        <section class="section" style="margin-top: 50px; border-top: 1px dashed #333; padding-top: 30px; background: transparent;">
            <h2 class="section-title ff-glow">📅 Phim mới cập nhật</h2>
            
            <div class="ff-grid" id="movie-grid"></div>
            
            <div class="pagination" id="pagination"></div>
        </section>

    </main>

    <aside class="right-panel">
        
        <div class="right-section ratings-section">
            <h3 class="right-title">⭐ Đánh giá</h3>
            <div class="ratings-box ff-glow">
                <span class="ff-rank" style="font-size: 30px;">#1</span>
                <div class="tmdb-rating">
                    <p class="tag-tmdb" style="font-size: 16px;">★ 9.2</p>
                    <p style="font-size: 11px; color: #aaa;">Based on Ophim</p>
                </div>
            </div>
        </div>

        <div class="right-section trailer-section">
            <h3 class="right-title">🎬 Trailers</h3>
            <div class="trailer-box ff-glow">
                <img src="" style="width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px;">
                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; color: #fff; font-size: 40px;">▶️</div>
            </div>
        </div>

        <div class="right-section cast-section">
            <h3 class="right-title">🎭 Diễn viên</h3>
            <div id="actorsList" class="actors-list">
                <span class="actor-tag">Đang tải...</span>
            </div>
        </div>
        
    </aside>  

    <script src="app.js"></script>
</body>
</html>
