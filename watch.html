<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm - Đang Xem Phim</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
        <div class="sidebar-wrapper">
            <a href="index.html" class="top-logo">
                <img src="logo.png" alt="FreeFilm" class="logo-img" onerror="this.outerHTML='<h2 class=\'logo-text\'>FREEFILM</h2>'">
            </a>
            <aside class="left-dock">
                <div class="dock-menu">
                    <div class="dock-btn" onclick="window.location.href='index.html'" title="Trang Chủ">🏠</div>
                    <div class="dock-btn active" title="Đang Xem">▶️</div>
                </div>
            </aside>
        </div>

        <main class="main-content">
            <header class="top-header" style="justify-content: flex-end; margin-bottom: 15px;">
                <button class="back-btn" onclick="window.location.href='index.html'">🔙 Quay Lại</button>
            </header>

                <div class="content-wrapper watch-wrapper" style="padding-top: 0;">
                <div class="player-container">
                    <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
                </div>
                <div class="player-container">
                    <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
                </div>
                
                <div class="player-controls-dock">
                    <button class="control-btn" id="btnPrevEp"><span>⏮️</span> Tập trước</button>
                    <button class="control-btn" id="btnTrailer"><span>🎦</span> Xem Trailer</button>
                    <button class="control-btn" id="btnReload"><span>🔁</span> Load lại</button>
                    <button class="control-btn" id="btnNextEp"><span>⏭️</span> Tập sau</button>
                </div>
                <div class="movie-info-box">
                    <h2 id="movieTitle" class="movie-detail-title">Đang tải dữ liệu...</h2>
                    <p id="movieDesc" class="movie-desc"></p>
                </div>

                <div class="episodes-section" id="serverSection" style="display: none; margin-bottom: 20px;">
                    <h3 class="section-subtitle" style="color: #00e5ff; border-left-color: #00e5ff;">🌐 Chọn Nguồn Phát</h3>
                    <div id="serverList" class="episodes-grid"></div>
                </div>

                <div class="episodes-section">
                    <h3 class="section-subtitle">▶️ Danh Sách Tập</h3>
                    <div id="episodeList" class="episodes-grid"></div>
                </div>

                <div class="meta-section">
                    <h3 class="meta-title">🖼️ Hình ảnh</h3>
                    <div id="imagesGallery" class="images-gallery"><span class="actor-tag">Đang tải...</span></div>
                </div>

                <div class="meta-section">
                    <h3 class="meta-title">🏷️ Từ khóa</h3>
                    <div id="keywordsList" class="keywords-list"><span class="actor-tag">Đang tải...</span></div>
                </div>
                <div class="meta-section">
                    <h3 class="meta-title">🏷️ Từ khóa</h3>
                    <div id="keywordsList" class="keywords-list"><span class="actor-tag">Đang tải...</span></div>
                </div>

                <div class="meta-section" style="margin-top: 40px; border-top: 2px dashed #333; padding-top: 30px; background: transparent; border-left: none; border-right: none; border-bottom: none;">
                    <h3 class="meta-title" style="color: #ff4500;">🔥 Có thể bạn sẽ thích</h3>
                    <div class="ff-grid" id="relatedMoviesGrid">
                        <span class="actor-tag">Đang tải dữ liệu...</span>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-panel watch-right-panel">
            <div class="right-section">
                <h3 class="right-title">🎭 Diễn viên</h3>
                <div id="actorsList" class="actors-list"><span class="actor-tag">Đang tải...</span></div>
            </div>
        </aside>
    </div>
    <div id="trailerModal" class="trailer-modal hidden">
            <div class="trailer-content">
                <button class="close-trailer" id="closeTrailer">❌</button>
                <iframe id="trailerIframe" allowfullscreen></iframe>
            </div>
        </div>
<script>
        const slug = new URLSearchParams(window.location.search).get('slug');
        const iframePlayer = document.getElementById('iframePlayer');
        const episodeListDiv = document.getElementById('episodeList');
        const serverSection = document.getElementById('serverSection');
        const serverListDiv = document.getElementById('serverList');
        
        const actorsList = document.getElementById('actorsList');
        const imagesGallery = document.getElementById('imagesGallery');
        const keywordsList = document.getElementById('keywordsList');
        const options = { method: 'GET', headers: { accept: 'application/json' } };

        // ⚡ BIẾN TOÀN CỤC ĐỂ THEO DÕI TẬP PHIM
        let currentEpList = [];
        let currentEpIndex = 0;
        let movieTrailerUrl = '';

        function playVideo(index, buttonEl) {
            currentEpIndex = index;
            const tap = currentEpList[index];
            iframePlayer.src = tap.link_embed;
            
            document.querySelectorAll('#episodeList .ep-btn').forEach(b => b.classList.remove('active'));
            if(buttonEl) buttonEl.classList.add('active');
            localStorage.setItem(`ff_history_${slug}`, tap.link_embed);

            // Bật tắt nút Tập trước / Tập sau
            document.getElementById('btnPrevEp').disabled = (index === 0);
            document.getElementById('btnNextEp').disabled = (index === currentEpList.length - 1);
        }

        function createSafeNode(tag, className, text) {
            const el = document.createElement(tag);
            el.className = className;
            el.innerText = text;
            return el;
        }

        // ⚡ SỰ KIỆN CỦA THANH DOCK PLAYER
        document.getElementById('btnPrevEp').onclick = () => { if(currentEpIndex > 0) playVideo(currentEpIndex - 1, episodeListDiv.children[currentEpIndex - 1]); };
        document.getElementById('btnNextEp').onclick = () => { if(currentEpIndex < currentEpList.length - 1) playVideo(currentEpIndex + 1, episodeListDiv.children[currentEpIndex + 1]); };
        document.getElementById('btnReload').onclick = () => { iframePlayer.src = iframePlayer.src; };
        
        // ⚡ SỰ KIỆN TRAILER
        document.getElementById('btnTrailer').onclick = () => {
            if (movieTrailerUrl) {
                let embedUrl = movieTrailerUrl;
                // Chuyển link watch Youtube thành link Embed
                if (embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                document.getElementById('trailerIframe').src = embedUrl;
                document.getElementById('trailerModal').classList.remove('hidden');
            } else {
                alert('Rất tiếc, bộ phim này chưa có Trailer cập nhật!');
            }
        };
        document.getElementById('closeTrailer').onclick = () => {
            document.getElementById('trailerModal').classList.add('hidden');
            document.getElementById('trailerIframe').src = ''; // Tắt tiếng khi đóng
        };

        // ⚡ HÀM LẤY PHIM LIÊN QUAN
        async function fetchRelatedMovies(catSlug) {
            try {
                const res = await fetch(`https://ophim1.com/v1/api/the-loai/${catSlug}?page=1`, options).then(r => r.json());
                const items = res.data?.items || res.items || [];
                const relatedGrid = document.getElementById('relatedMoviesGrid');
                relatedGrid.innerHTML = '';
                
                // Lọc bỏ phim đang xem và lấy 4 phim
                const related = items.filter(m => m.slug !== slug).slice(0, 4);
                
                if (related.length === 0) {
                    relatedGrid.innerHTML = '<span class="actor-tag">Không tìm thấy phim liên quan.</span>';
                    return;
                }
                
                let imgDomain = (res.data?.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');
                
                related.forEach(m => {
                    const type = (m.type === 'series') ? 'Phim Bộ' : 'Phim Lẻ';
                    const card = createSafeNode('div', 'ff-card', '');
                    card.onclick = () => window.location.href = `watch.html?slug=${m.slug}`;
                    
                    let thumb = m.thumb_url || m.poster_url || '';
                    if (!thumb.startsWith('http')) {
                        if (!thumb.includes('uploads/movies/')) thumb = '/uploads/movies/' + thumb.replace(/^\//, '');
                        else if (!thumb.startsWith('/')) thumb = '/' + thumb;
                        thumb = imgDomain + thumb;
                    }
                    
                    const img = document.createElement('img');
                    img.src = thumb; img.className = 'ff-thumb'; img.alt = m.name;

                    const titleEl = createSafeNode('h3', 'ff-title', m.name);
                    titleEl.title = m.name;

                    const tags = createSafeNode('div', 'ff-tags', '');
                    tags.appendChild(createSafeNode('span', 'tag-status', type));
                    
                    let rawScore = (m.tmdb && m.tmdb.vote_average) ? parseFloat(m.tmdb.vote_average) : 0;
                    let displayScore = (rawScore > 0) ? rawScore.toFixed(1) : 'N/A';
                    tags.innerHTML += `<span class="tag-tmdb">★ ${displayScore}</span>`;

                    const footer = createSafeNode('div', 'ff-card-footer', '');
                    footer.innerHTML = '<div class="blue-underline"></div>';

                    card.append(img, titleEl, tags, footer);
                    relatedGrid.appendChild(card);
                });
            } catch(e) {
                console.error(e);
                document.getElementById('relatedMoviesGrid').innerHTML = '<span class="actor-tag">Lỗi kết nối API phim liên quan.</span>';
            }
        }

        async function fetchDetail() {
            if (!slug) { document.getElementById('movieTitle').innerText = "Lỗi đường dẫn!"; return; }
            try {
                const [resPhim, resPeoples, resImages, resKeywords] = await Promise.all([
                    fetch(`https://ophim1.com/v1/api/phim/${slug}`, options).then(r => r.json()),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/peoples`, options).then(r => r.json()).catch(() => null),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/images`, options).then(r => r.json()).catch(() => null),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/keywords`, options).then(r => r.json()).catch(() => null)
                ]);

                const dataObj = resPhim.data || resPhim;
                const movie = dataObj.item || dataObj.movie;
                const episodesArray = movie.episodes || resPhim.episodes;
                let imgDomain = (dataObj.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');

                if (movie) {
                    document.title = `Đang xem: ${movie.name}`;
                    document.getElementById('movieTitle').innerText = movie.name;
                    movieTrailerUrl = movie.trailer_url || '';

                    // Bảng Meta Info
                    const oldInfo = document.getElementById('movieMetaInfo');
                    if (oldInfo) oldInfo.remove();
                    const directorInfo = (movie.director && movie.director[0]) ? movie.director.join(', ') : 'Đang cập nhật';
                    const countryInfo = (movie.country && movie.country.length > 0) ? movie.country[0].name : 'Đang cập nhật';
                    const yearInfo = movie.year || 'Đang cập nhật';
                    const timeInfo = movie.time || 'Đang cập nhật';
                    const progressInfo = `${movie.episode_current || '?'} / ${movie.episode_total || '?'}`;
                    const formatInfo = `${movie.quality || ''} ${movie.lang ? '- ' + movie.lang : ''}`;
                    const infoGrid = document.createElement('div');
                    infoGrid.id = 'movieMetaInfo';
                    infoGrid.className = 'movie-meta-info';
                    infoGrid.innerHTML = `
                        <div class="meta-item"><span>🎬 Đạo diễn:</span> ${directorInfo}</div>
                        <div class="meta-item"><span>🌍 Quốc gia:</span> ${countryInfo}</div>
                        <div class="meta-item"><span>📅 Phát hành:</span> ${yearInfo}</div>
                        <div class="meta-item"><span>⏳ Thời lượng:</span> ${timeInfo}</div>
                        <div class="meta-item"><span>📺 Tiến độ:</span> ${progressInfo}</div>
                        <div class="meta-item"><span>✨ Định dạng:</span> ${formatInfo}</div>
                    `;
                    
                    document.getElementById('movieDesc').innerHTML = movie.content || movie.description || "Chưa có mô tả chi tiết.";
                    document.getElementById('movieDesc').parentNode.appendChild(infoGrid);

                    let rawScore = (movie.tmdb && movie.tmdb.vote_average) ? parseFloat(movie.tmdb.vote_average) : 0;
                    let displayTmdb = (rawScore > 0) ? rawScore.toFixed(1) : 'N/A';
                    if (!document.getElementById('movieTmdbScore')) {
                        const scorePara = document.createElement('p');
                        scorePara.id = 'movieTmdbScore';
                        scorePara.className = 'movie-tmdb-score';
                        scorePara.innerHTML = `<span>⭐ TMDB: ${displayTmdb}</span>`;
                        document.getElementById('movieTitle').parentNode.insertBefore(scorePara, document.getElementById('movieDesc'));
                    }    

                    // Gọi tính năng Phim liên quan (Dựa vào thể loại đầu tiên)
                    if (movie.category && movie.category.length > 0) {
                        fetchRelatedMovies(movie.category[0].slug);
                    } else {
                        document.getElementById('relatedMoviesGrid').innerHTML = '<span class="actor-tag">Không tìm thấy thông tin liên quan.</span>';
                    }

                    // --- LOGIC RENDER NGUỒN PHÁT (SERVER) VÀ TẬP PHIM ---
                    if (!episodesArray || episodesArray.length === 0) { 
                        episodeListDiv.appendChild(createSafeNode('p', '', 'Chưa cập nhật link xem.')); 
                    } else {
                        function renderEpisodesForServer(serverIndex) {
                            episodeListDiv.innerHTML = '';
                            currentEpList = episodesArray[serverIndex].server_data || [];
                            
                            if (currentEpList.length === 0) { 
                                episodeListDiv.appendChild(createSafeNode('p', '', 'Chưa có tập phim nào.')); 
                                document.getElementById('btnPrevEp').disabled = true;
                                document.getElementById('btnNextEp').disabled = true;
                                return;
                            }

                            const savedEpUrl = localStorage.getItem(`ff_history_${slug}`);
                            let hasPlayed = false;

                            currentEpList.forEach((tap, index) => {
                                const btn = createSafeNode('button', 'ep-btn', tap.name || `Tập ${index + 1}`);
                                btn.onclick = () => { playVideo(index, btn); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                                episodeListDiv.appendChild(btn);

                                if (savedEpUrl && tap.link_embed === savedEpUrl) {
                                    playVideo(index, btn);
                                    hasPlayed = true;
                                } else if (!savedEpUrl && index === 0) {
                                    playVideo(index, btn);
                                    hasPlayed = true;
                                }
                            });

                            if (!hasPlayed && currentEpList.length > 0) {
                                playVideo(0, episodeListDiv.firstChild);
                            }
                        }

                        if (episodesArray.length > 0) {
                            serverSection.style.display = 'block';
                            episodesArray.forEach((server, index) => {
                                const srvBtn = createSafeNode('button', 'ep-btn', server.server_name || `Nguồn ${index + 1}`);
                                srvBtn.onclick = () => {
                                    document.querySelectorAll('#serverList .ep-btn').forEach(b => b.classList.remove('active'));
                                    srvBtn.classList.add('active');
                                    renderEpisodesForServer(index);
                                };
                                serverListDiv.appendChild(srvBtn);
                                if (index === 0) srvBtn.click();
                            });
                        }
                    }

                    // --- DIỄN VIÊN ---
                    actorsList.innerHTML = '';
                    if (resPeoples && resPeoples.data && resPeoples.data.peoples && resPeoples.data.peoples.length > 0) {
                        resPeoples.data.peoples.forEach(actor => {
                            const actorCard = document.createElement('div');
                            actorCard.className = 'actor-card';

                            let mediaElement;
                            if (actor.profile_path) {
                                mediaElement = document.createElement('img');
                                mediaElement.className = 'actor-img';
                                mediaElement.src = `https://image.tmdb.org/t/p/w185${actor.profile_path}`;
                                mediaElement.alt = actor.name;
                            } else {
                                mediaElement = document.createElement('div');
                                mediaElement.className = 'actor-img actor-no-img-placeholder';
                                mediaElement.innerText = '👯';
                                mediaElement.title = actor.name;
                            }

                            actorCard.append(mediaElement, createSafeNode('p', 'actor-name', actor.name), createSafeNode('p', 'actor-role', actor.character || '...'));
                            actorsList.appendChild(actorCard);
                        });
                    } else if (movie.actor && movie.actor.length > 0 && movie.actor[0] !== "") {
                        movie.actor.forEach(actorName => {
                            const actorCard = document.createElement('div');
                            actorCard.className = 'actor-card';
                            
                            const mediaElement = document.createElement('div');
                            mediaElement.className = 'actor-img actor-no-img-placeholder';
                            mediaElement.innerText = '👯';
                            mediaElement.title = actorName;

                            actorCard.append(mediaElement, createSafeNode('p', 'actor-name', actorName), createSafeNode('p', 'actor-role', '...'));
                            actorsList.appendChild(actorCard);
                        });
                    } else {
                        actorsList.innerHTML = '<span class="actor-tag">Đang cập nhật...</span>';
                    }                    

                    // --- HÌNH ẢNH ---
                    imagesGallery.innerHTML = '';
                    let extractedImages = [];
                    if (resImages) {
                        let possibleArrays = [resImages.backdrops, resImages.posters, resImages.data?.items, resImages.data?.images, resImages.data, resImages.items, resImages.images, resImages];
                        possibleArrays.forEach(arr => {
                            if (Array.isArray(arr) && arr.length > 0) {
                                arr.forEach(img => {
                                    let link = null;
                                    if (typeof img === 'string') link = img;
                                    else if (typeof img === 'object' && img !== null) link = img.file_path || img.url || img.link || img.file || img.path || img.src || img.image;
                                    if (link) extractedImages.push(link);
                                });
                            }
                        });
                    }
                    if (extractedImages.length === 0) {
                        if (movie.poster_url) extractedImages.push(movie.poster_url);
                        if (movie.thumb_url && movie.thumb_url !== movie.poster_url) extractedImages.push(movie.thumb_url);
                    }
                    extractedImages = [...new Set(extractedImages)].filter(url => url && url.trim() !== '');

                    if (extractedImages.length > 0) {
                        extractedImages.forEach(url => {
                            if (!url.startsWith('http')) {
                                if (url.startsWith('/') && (url.endsWith('.jpg') || url.endsWith('.png') || url.endsWith('.webp'))) url = 'https://image.tmdb.org/t/p/original' + url;
                                else {
                                    if (!url.includes('uploads/movies/')) url = '/uploads/movies/' + url.replace(/^\//, '');
                                    else if (!url.startsWith('/')) url = '/' + url;
                                    url = imgDomain + url;
                                }
                            }
                            const imgEl = document.createElement('img');
                            imgEl.src = url; imgEl.className = 'gallery-img'; imgEl.alt = 'Cảnh phim';
                            imagesGallery.appendChild(imgEl);
                        });
                    } else { imagesGallery.appendChild(createSafeNode('span', 'actor-tag', 'Chưa có hình ảnh.')); }

                    // --- TỪ KHÓA ---
                    keywordsList.innerHTML = '';
                    if (resKeywords && resKeywords.data && resKeywords.data.keywords && resKeywords.data.keywords.length > 0) {
                        resKeywords.data.keywords.forEach(kw => {
                            const keywordText = kw.name_vn || kw.name;
                            keywordsList.appendChild(createSafeNode('span', 'keyword-badge', `#${keywordText.toLowerCase()}`));
                        });
                    } else if (movie.category && movie.category.length > 0) {
                        movie.category.forEach(c => keywordsList.appendChild(createSafeNode('span', 'keyword-badge', `#${c.name.toLowerCase()}`)));
                    } else {
                        keywordsList.appendChild(createSafeNode('span', 'actor-tag', 'Chưa có từ khóa.'));
                    }

                } else { document.getElementById('movieTitle').innerText = "Không tìm thấy dữ liệu!"; }
            } catch (error) { 
                document.getElementById('movieTitle').innerText = "Lỗi máy chủ Ophim!"; 
                console.error(error);
            }
        }

        const playerContainer = document.querySelector('.player-container');
        playerContainer.insertAdjacentHTML('afterbegin', '<div class="iframe-fallback"><span>Đang tải video hoặc link máy chủ bị lỗi...</span></div>');
        
        fetchDetail();
    </script>
    </body>
</html>
