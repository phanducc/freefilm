<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm - Đang Xem Phim</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://img.ophim.live">    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        .watch-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 100px 20px 50px 20px; 
            width: 100%; 
        }
        
        .player-wrapper { 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            border: 1px solid #fbcbdf; 
            margin-bottom: 20px;
            position: relative;
        }
        .player-wrapper iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: relative; 
            z-index: 2;
        }
        .iframe-fallback { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #888; 
            z-index: 1;
        }
        
        :root {
            --plyr-color-main: #ff75a0;
            --plyr-video-background: #000000;
        }

        .plyr {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: none;
        }

        .controls-bar { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
            background: rgba(13, 13, 18, 0.6); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #fbcbdf80;
        }
        .control-btn { 
            background: #fbcbdf80; 
            border: 1px solid #fbcbdf; 
            color: #fbcbdf; 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px;
        }
        .control-btn:hover:not(:disabled) { 
            background: #fbcbdf; 
            color: #111; 
            box-shadow: 0 0 15px #fbcbdf80; 
        }
        .control-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }

        .section-heading { 
            font-size: 20px; 
            font-weight: 700; 
            color: #fbcbdf;
            text-shadow: none !important;
            margin-bottom: 15px; 
            border-left: 4px solid #fbcbdf; 
            padding-left: 10px; 
        }
        
        .glass-panel { 
            background: rgba(15, 15, 15, 0.5); 
            border: 1px solid #fbcbdf80; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 30px; 
            color: #fbcbdf;
        }

        .episodes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; 
        }
        .ep-btn { 
            background: #fbcbdf80 !important; 
            border: 1px solid #fbcbdf80 !important; 
            color: #fbcbdf !important;
            padding: 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: center; 
            font-weight: 700 !important;
            transition: 0.3s; 
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
        }
        
        .ep-btn:hover { 
            background: #000000 !important; 
            color: #fbcbdf !important; 
            border-color: #fbcbdf !important;

        }
        
        .ep-btn.active { 
            background: #ff75a0 !important; 
            color: #fbcbdf !important; 
            border-color: #fbcbdf !important; 
            box-shadow: 0 5px 15px rgba(255, 117, 160, 0.4) !important; 
        }

        .movie-title-large { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: #fbcbdf;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }
        .movie-meta-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
            color: #fbcbdf; 
            font-size: 14px;
        }
        .movie-meta-info span { 
            color: #fbcbdf; 
            text-shadow: none !important;
            font-weight: 700; 
            margin-right: 5px; 
        }
        .movie-desc { 
            color: #fbcbdf; 
            line-height: 1.6; 
            margin-top: 15px; 
            font-size: 15px; 
        }

        .info-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .info-poster {
            flex-shrink: 0;
            width: 250px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #fbcbdf80;
        }
        .info-poster img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        .info-text {
            flex: 1;
        }

        .actors-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 15px; 
        }
        .actor-card { 
            text-align: center; 
        }
        .actor-img { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #fbcbdf80; 
            margin-bottom: 8px; 
        }
        .actor-name { 
            color: #fbcbdf; 
            font-size: 13px; 
            font-weight: 600; 
            text-shadow: none !important;
        }

        .trailer-modal {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            opacity: 0; 
            pointer-events: none; 
            transition: 0.3s ease;
        }
        .trailer-modal.show { 
            opacity: 1; 
            pointer-events: auto; 
        }
        .trailer-content {
            width: 90%; 
            max-width: 900px; 
            aspect-ratio: 16/9; 
            background: #000;
            border-radius: 16px; 
            position: relative; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid #fbcbdf80;
        }
        .trailer-content iframe { 
            width: 100%; 
            height: 100%; 
            border-radius: 16px; 
            border: none; 
        }
        .close-trailer-btn {
            position: absolute; 
            top: -45px; 
            right: -10px; 
            background: transparent;
            border: none; 
            color: #fbcbdf; 
            font-size: 30px; 
            cursor: pointer;
            transition: 0.3s; 
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .close-trailer-btn:hover { 
            color: #ff4500; 
            transform: scale(1.1); 
        }

        @media (max-width: 768px) {
            .watch-container { padding-top: 80px; }
            .control-btn { padding: 8px 12px; font-size: 12px; }
            .movie-title-large { font-size: 24px; }
            .close-trailer-btn { right: 0; top: -40px; }
        }

        .related-grid { 
            display: grid; 
            grid-template-columns: repeat(6, minmax(0, 1fr)); 
            gap: 15px; 
            width: 100%; 
        }
        @media (max-width: 1024px) { 
            .related-grid { grid-template-columns: repeat(3, 1fr); } 
        }
        @media (max-width: 480px) {
            .info-layout {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .info-poster {
                width: 200px;
                margin-bottom: 10px;
            }
            .movie-meta-info, .movie-desc {
                text-align: left;
            } 
            .related-grid { grid-template-columns: repeat(2, 1fr); } 
        }
    </style>
</head>
<body>
    
    <header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>

            <div class="nav-pill" id="navPill">
                <nav class="nav-links" id="navLinks">
                    <span class="nav-item" data-slug="phim-bo">Phim Bộ</span>
                    <span class="nav-item" data-slug="phim-le">Phim Lẻ</span>
                    <span class="nav-item" data-slug="hoat-hinh">Hoạt Hình</span>
                    <span class="nav-item" data-slug="tv-shows">TV Shows</span>
                </nav>
                
                <div class="search-box" id="searchBox">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    <button id="closeSearchBtn" class="close-search">✕</button>
                </div>

                <button class="search-toggle-btn" id="searchToggleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>

            <div class="header-right"></div>
        </div>
    </header>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

    <main class="watch-container">
        
        <div class="player-wrapper">
            <video id="myPlayer" controls crossorigin playsinline style="width: 100%; height: 100%;"></video>
            
            <div class="iframe-fallback">Đang kết nối tới máy chủ Video...</div>
            <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="btnPrevEp">⏮️ Tập trước</button>
            <button class="control-btn" id="btnTrailer">🎦 Xem Trailer</button>
            <button class="control-btn" id="btnReload">🔁 Load lại</button>
            <button class="control-btn" id="btnNextEp">⏭️ Tập sau</button>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">▶️ Danh Sách Tập</h3>
            <div class="episodes-section" id="serverSection" style="display: none; margin-bottom: 15px;">
                <div id="serverList" style="display: flex; gap: 10px; margin-bottom: 15px;"></div>
            </div>
            <div id="episodeList" class="episodes-grid">
                <span style="color:#aaa;">Đang tải danh sách tập...</span>
            </div>
        </div>

        <div class="glass-panel info-layout">
            <div class="info-poster">
                <img id="movieDetailThumb" src="" alt="Poster Phim">
            </div>
            
            <div class="info-text">
                <h1 id="movieTitle" class="movie-title-large">Đang tải thông tin...</h1>
                <p id="movieTmdbScore" style="color: #f5c518; font-weight: 700; font-size: 16px;"></p>
                <div class="movie-meta-info" id="movieMetaInfo"></div>
                <div id="movieDesc" class="movie-desc"></div>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">🎭 Diễn viên</h3>
            <div id="actorsList" class="actors-list">
                <span style="color:#aaa;">Đang tải diễn viên...</span>
            </div>
        </div>

        <div class="recommended-section" style="margin-top: 40px;">
            <h3 class="section-heading">🔥 Có thể bạn sẽ thích</h3>
            <div id="relatedMoviesGrid" class="related-grid">
                <span style="color:#aaa;">Đang tải gợi ý...</span>
            </div>
        </div>
        
    </main>

    <div id="trailerModal" class="trailer-modal">
        <div class="trailer-content">
            <button id="closeTrailerBtn" class="close-trailer-btn">❌</button>
            <iframe id="trailerIframe" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');
        const options = { method: 'GET', headers: { accept: 'application/json' } };
        
        const iframePlayer = document.getElementById('iframePlayer');
        const episodeListDiv = document.getElementById('episodeList');
        const serverListDiv = document.getElementById('serverList');
        
        let currentEpList = [];
        let currentEpIndex = 0;
        let movieTrailerUrl = '';

        const navPill = document.getElementById('navPill');
        const searchToggleBtn = document.getElementById('searchToggleBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const searchInput = document.getElementById('searchInput');

        if (searchToggleBtn && closeSearchBtn && navPill && searchInput) {
            searchToggleBtn.onclick = () => {
                navPill.classList.add('searching');
                searchInput.focus();
            };

            closeSearchBtn.onclick = () => {
                navPill.classList.remove('searching');
                searchInput.value = '';
            };

            searchInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query) {
                        window.location.href = `index.html?search=${encodeURIComponent(query)}`;
                    }
                }
            };
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                const slug = item.dataset.slug;
                const title = item.innerText;
                window.location.href = `index.html?category=${slug}&title=${encodeURIComponent(title)}`;
            };
        });

        const trailerModal = document.getElementById('trailerModal');
        const trailerIframe = document.getElementById('trailerIframe');
        
        document.getElementById('btnTrailer').onclick = () => {
            if (movieTrailerUrl) {
                let embedUrl = movieTrailerUrl;
                if (embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                embedUrl += (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                trailerIframe.src = embedUrl;
                trailerModal.classList.add('show');
            } else {
                alert('Phim này chưa có Trailer!');
            }
        };

        document.getElementById('closeTrailerBtn').onclick = () => {
            trailerModal.classList.remove('show');
            trailerIframe.src = ''; 
        };

        const videoElement = document.getElementById('myPlayer');
        const player = new Plyr(videoElement, {
            controls: [
                'play-large',
                'restart',
                'rewind',
                'play',
                'fast-forward',
                'progress',
                'current-time',
                'duration',
                'mute',
                'volume',
                'captions',
                'settings',
                'pip',
                'airplay',
                'download',
                'fullscreen'
            ],
            seekTime: 10,
            i18n: { 
                speed: 'Tốc độ', 
                quality: 'Chất lượng', 
                normal: 'Bình thường',
                rewind: 'Tua lại 10s',
                fastForward: 'Tua tới 10s',
                restart: 'Xem lại từ đầu',
                download: 'Tải phim về máy',
                captions: 'Phụ đề',
                settings: 'Cài đặt',
                pip: 'Hình trong hình',
                enterFullscreen: 'Toàn màn hình',
                exitFullscreen: 'Thoát toàn màn hình',
                mute: 'Tắt tiếng',
                unmute: 'Bật tiếng',
                play: 'Phát',
                pause: 'Tạm dừng'
            }
        });
        let hls = null;

        function playVideo(index, buttonEl) {
            currentEpIndex = index;
            const epData = currentEpList[index];
            const fallback = document.querySelector('.iframe-fallback');
            const plyrWrapper = document.querySelector('.plyr');

            if (epData.link_m3u8) {
                iframePlayer.style.display = 'none';
                fallback.style.display = 'none';
                plyrWrapper.style.display = 'block';
                videoElement.style.display = 'block';
                iframePlayer.src = 'about:blank';

                if (Hls.isSupported()) {
                    if (hls) hls.destroy();
                    hls = new Hls();
                    hls.loadSource(epData.link_m3u8);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        videoElement.play().catch(() => {});
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = epData.link_m3u8;
                    videoElement.play();
                }
                localStorage.setItem(`ff_history_${slug}`, epData.link_m3u8);
            } 
            else {
                player.pause();
                plyrWrapper.style.display = 'none';
                videoElement.style.display = 'none';
                iframePlayer.style.display = 'block';
                fallback.style.display = 'flex';
                
                iframePlayer.src = epData.link_embed;
                iframePlayer.onload = () => { fallback.style.display = 'none'; };
                localStorage.setItem(`ff_history_${slug}`, epData.link_embed);
            }
            
            episodeListDiv.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            if(buttonEl) buttonEl.classList.add('active');

            document.getElementById('btnPrevEp').disabled = (index === 0);
            document.getElementById('btnNextEp').disabled = (index === currentEpList.length - 1);
        }

        document.getElementById('btnPrevEp').onclick = () => { 
            if(currentEpIndex > 0) playVideo(currentEpIndex - 1, episodeListDiv.children[currentEpIndex - 1]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        document.getElementById('btnNextEp').onclick = () => { 
            if(currentEpIndex < currentEpList.length - 1) playVideo(currentEpIndex + 1, episodeListDiv.children[currentEpIndex + 1]); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        document.getElementById('btnReload').onclick = () => { 
            iframePlayer.src = iframePlayer.src; 
        };

        async function fetchRelatedMovies(catSlug) {
            try {
                const res = await fetch(`https://ophim1.com/v1/api/the-loai/${catSlug}?page=1`, options).then(r => r.json());
                let items = res.data?.items || res.items || [];
                const relatedGrid = document.getElementById('relatedMoviesGrid');
                relatedGrid.innerHTML = '';
                
                let related = items.filter(m => m.slug !== slug);
                related = related.sort(() => 0.5 - Math.random()).slice(0, 6);
                
                let imgDomain = (res.data?.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');
                
                related.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card'; 
                    card.style.background = 'transparent';
                    card.style.padding = '0'; 
                    card.style.cursor = 'pointer';
                    card.onclick = () => window.location.href = `watch.html?slug=${movie.slug}`;

                    let rawScore = (movie.imdb && movie.imdb.vote_average) ? parseFloat(movie.imdb.vote_average) : ((movie.tmdb && movie.tmdb.vote_average) ? parseFloat(movie.tmdb.vote_average) : 0);
                    let displayScore = (rawScore > 0) ? rawScore.toFixed(1) : 'N/A';
                    let typeText = 'Phim Bộ';
                    if (movie.tmdb && movie.tmdb.type) {
                        typeText = movie.tmdb.type === 'movie' ? 'Phim Lẻ' : 'Phim Bộ';
                    } else if (movie.type === 'single' || movie.type === 'chieurap') {
                        typeText = 'Phim Lẻ';
                    }
                    let thumb = movie.thumb_url || movie.poster_url || '';
                    if (!thumb.startsWith('http')) {
                        if (!thumb.includes('uploads/movies/')) thumb = '/uploads/movies/' + thumb.replace(/^\//, '');
                        else if (!thumb.startsWith('/')) thumb = '/' + thumb;
                        thumb = imgDomain + thumb;
                    }
                    if (window.innerWidth <= 480) {
                        thumb = `https://wsrv.nl/?url=${encodeURIComponent(thumb)}&w=200&q=65&output=webp`;
                    }

                    card.innerHTML = `
                        <div class="thumb-wrapper">
                            <img src="${thumb}" class="movie-thumb" alt="${movie.name}">
                        </div>
                        <h3 class="movie-title">${movie.name}</h3>
                        <div class="movie-meta">
                            <span class="movie-score">★ ${displayScore}</span>
                            <span class="movie-type-badge">${typeText}</span>
                        </div>
                    `;
                    relatedGrid.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }
        
        async function fetchDetail() {
            if (!slug) { 
                document.getElementById('movieTitle').innerText = "Lỗi đường dẫn!"; 
                return; 
            }
            try {
                const resPhim = await fetch(`https://ophim1.com/v1/api/phim/${slug}`, options).then(r => r.json());
                const dataObj = resPhim.data || resPhim;
                const movie = dataObj.item || dataObj.movie;

                if (movie) {
                    document.title = `Đang xem: ${movie.name}`;
                    document.getElementById('movieTitle').innerText = movie.name;

                    let imgDomain = (dataObj.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');
                    let detailThumb = movie.thumb_url || movie.poster_url || '';
                    if (!detailThumb.startsWith('http')) {
                        if (!detailThumb.includes('uploads/movies/')) detailThumb = '/uploads/movies/' + detailThumb.replace(/^\//, '');
                        else if (!detailThumb.startsWith('/')) detailThumb = '/' + detailThumb;
                        detailThumb = imgDomain + detailThumb;
                    }
                    if (window.innerWidth <= 768 && detailThumb !== '') {
                        detailThumb = `https://wsrv.nl/?url=${encodeURIComponent(detailThumb)}&w=300&q=70&output=webp`;
                    }
                    document.getElementById('movieDetailThumb').src = detailThumb;
                    
                    movieTrailerUrl = movie.trailer_url || '';

                    let rawScore = (movie.imdb && movie.imdb.vote_average) ? parseFloat(movie.imdb.vote_average) : ((movie.tmdb && movie.tmdb.vote_average) ? parseFloat(movie.tmdb.vote_average) : 0);
                    document.getElementById('movieTmdbScore').innerText = `⭐ Điểm đánh giá: ${(rawScore > 0) ? rawScore.toFixed(1) : 'Chưa có'}`;

                    document.getElementById('movieMetaInfo').innerHTML = `
                        <div><span>🎬 Đạo diễn:</span> ${movie.director?.[0] || 'Đang cập nhật'}</div>
                        <div><span>🌍 Quốc gia:</span> ${movie.country?.[0]?.name || 'Đang cập nhật'}</div>
                        <div><span>📅 Phát hành:</span> ${movie.year || 'Đang cập nhật'}</div>
                        <div><span>⏳ Thời lượng:</span> ${movie.time || 'Đang cập nhật'}</div>
                        <div><span>📺 Tiến độ:</span> ${movie.episode_current || '?'} / ${movie.episode_total || '?'}</div>
                        <div><span>✨ Định dạng:</span> ${movie.quality || ''} ${movie.lang ? '- ' + movie.lang : ''}</div>
                    `;
                    document.getElementById('movieDesc').innerHTML = movie.content || "Chưa có mô tả chi tiết.";

                    let episodesArray = movie.episodes || resPhim.episodes;
                    
                    if (episodesArray && episodesArray.length > 0) {
                        let newServers = [];
                        
                        episodesArray.forEach(server => {
                            let sName = server.server_name || "";
                            let typeName = sName.toLowerCase().includes('thuyết minh') ? 'Thuyết Minh' : 'Vietsub';
                            
                            newServers.push({
                                server_name: `SV1 ${typeName}`,
                                server_data: server.server_data.map(ep => ({
                                    name: ep.name,
                                    link_embed: "", 
                                    link_m3u8: ep.link_m3u8 
                                }))
                            });
                            
                            newServers.push({
                                server_name: `SV2 ${typeName}`,
                                server_data: server.server_data.map(ep => ({
                                    name: ep.name,
                                    link_embed: ep.link_embed,
                                    link_m3u8: "" 
                                }))
                            });
                        });
                        
                        episodesArray = newServers; 
                    }
                    if (!episodesArray || episodesArray.length === 0) { 
                        episodeListDiv.innerHTML = '<p>Chưa cập nhật link xem.</p>'; 
                    } else {
                        function renderEpisodes(serverIndex) {
                            episodeListDiv.innerHTML = '';
                            currentEpList = episodesArray[serverIndex].server_data || [];
                            const savedEp = localStorage.getItem(`ff_history_${slug}`);

                            currentEpList.forEach((tap, i) => {
                                const btn = document.createElement('button');
                                btn.className = 'ep-btn'; 
                                btn.innerText = tap.name || `Tập ${i + 1}`;
                                btn.onclick = () => { playVideo(i, btn); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                                episodeListDiv.appendChild(btn);
                            });
                            let targetIndex = currentEpIndex;
                            if (targetIndex >= currentEpList.length) {
                                targetIndex = 0;
                            }
                            let historyIndex = currentEpList.findIndex(tap => savedEp && (tap.link_embed === savedEp || tap.link_m3u8 === savedEp));
                            if (historyIndex !== -1) {
                                targetIndex = historyIndex;
                            }
                            const targetBtn = episodeListDiv.children[targetIndex];
                            if (targetBtn) {
                                playVideo(targetIndex, targetBtn);
                            }
                        }

                        document.getElementById('serverSection').style.display = 'block';
                        episodesArray.forEach((server, i) => {
                            const btn = document.createElement('button');
                            btn.className = 'ep-btn'; 
                            btn.innerText = server.server_name || `Server ${i + 1}`;
                            btn.onclick = () => {
                                serverListDiv.querySelectorAll('button').forEach(b => {
                                    b.classList.remove('active');
                                    b.style.background = ''; 
                                    b.style.color = '';
                                });
                                btn.classList.add('active');
                                renderEpisodes(i);
                            };
                            serverListDiv.appendChild(btn);
                            if(i===0) btn.click();
                        });
                    }

                    if(movie.category && movie.category.length > 0) {
                        fetchRelatedMovies(movie.category[0].slug);
                    }

                    const resPeoples = await fetch(`https://ophim1.com/v1/api/phim/${slug}/peoples`, options).then(r => r.json()).catch(()=>null);
                    const actorsList = document.getElementById('actorsList');
                    actorsList.innerHTML = '';
                    if (resPeoples?.data?.peoples?.length > 0) {
                        let actorsHtml = '';
                        resPeoples.data.peoples.slice(0, 27).forEach(actor => {
                            actorsHtml += `
                                <div class="actor-card">
                                    ${actor.profile_path ? `<img src="https://image.tmdb.org/t/p/w185${actor.profile_path}" class="actor-img">` : `<div class="actor-img" style="display:flex; align-items:center; justify-content:center; font-size: 45px; background:#fbcbdf;">🤹</div>`}
                                    <div class="actor-name">${actor.name}</div>
                                </div>
                            `;
                        });
                        actorsList.innerHTML = actorsHtml;
                    } else { 
                        actorsList.innerHTML = '<span style="color:#aaa;">Đang cập nhật...</span>'; 
                    }
                }
                else {
                    document.title = "Không tìm thấy phim";
                    document.getElementById('movieTitle').innerText = "Phim không tồn tại hoặc đã bị xóa 🥲";
                    document.getElementById('movieDesc').innerHTML = "Vui lòng quay lại trang chủ và chọn phim khác nhé!";
                    document.getElementById('serverSection').style.display = 'none';
                    document.querySelector('.player-wrapper').style.display = 'none';
                }
            } catch (error) { 
                console.error(error); 
            }
        }

        fetchDetail();
    </script>
