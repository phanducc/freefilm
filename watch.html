<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FreeFilm - Huyền Thoại Phim Lậu. Xem phim online miễn phí chất lượng cao.">
    <title>FreeFilm - Đang Xem Phim</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://img.ophim.live">    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/watch.css">
</head>
<body>
    
    <header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>

            <div class="nav-pill" id="navPill">
                <nav class="nav-links" id="navLinks">
                    <span class="nav-item" data-slug="phim-bo">Phim Bộ</span>
                    <span class="nav-item" data-slug="phim-le">Phim Lẻ</span>
                    <span class="nav-item" data-slug="hoat-hinh">Hoạt Hình</span>
                    <span class="nav-item" data-slug="tv-shows">TV Shows</span>
                </nav>
                
                <div class="search-box" id="searchBox">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    <button id="closeSearchBtn" class="close-search">✕</button>
                </div>

                <button class="search-toggle-btn" id="searchToggleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>

            <div class="header-right"></div>
        </div>
    </header>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

    <main class="watch-container">
        
        <div class="player-wrapper">
            <video id="myPlayer" controls crossorigin playsinline style="width: 100%; height: 100%;"></video>
            
            <div class="iframe-fallback">Chờ xíu đi, sắp xem được rồi...</div>
            <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="btnPrevEp">⏮️ Tập trước</button>
            <button class="control-btn" id="btnTrailer">🎦 Xem Trailer</button>
            <button class="control-btn" id="btnReload">🔁 Load lại</button>
            <button class="control-btn" id="btnNextEp">⏭️ Tập sau</button>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">▶️ Danh Sách Tập</h3>
            <div class="episodes-section" id="serverSection" style="display: none; margin-bottom: 15px;">
                <div id="serverList" style="display: flex; gap: 10px; margin-bottom: 15px;"></div>
            </div>
            <div id="episodeList" class="episodes-grid">
                <span style="color:#aaa;">Tớ đang tìm mấy cái tập phim...</span>
            </div>
        </div>

        <div class="glass-panel info-layout">
            <div class="info-poster">
                <img id="movieDetailThumb" src="" alt="Poster Phim">
            </div>
            
            <div class="info-text">
                <h1 id="movieTitle" class="movie-title-large">Tớ đang tìm thông tin phim...</h1>
                <p id="movieTmdbScore" style="color: #f5c518; font-weight: 700; font-size: 16px;"></p>
                <div class="movie-meta-info" id="movieMetaInfo"></div>
                <div id="movieDesc" class="movie-desc"></div>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">🎭 Diễn viên</h3>
            <div id="actorsList" class="actors-list">
                <span style="color:#aaa;">Tớ đang tìm diễn viên...</span>
            </div>
        </div>

        <div class="recommended-section" style="margin-top: 40px;">
            <h3 class="section-heading">🔥 Có thể bạn sẽ thích</h3>
            <div id="relatedMoviesGrid" class="related-grid">
                <span style="color:#aaa;">Tớ đang tìm gợi ý...</span>
            </div>
        </div>
        
    </main>

    <div id="trailerModal" class="trailer-modal">
        <div class="trailer-content">
            <button id="closeTrailerBtn" class="close-trailer-btn">❌</button>
            <iframe id="trailerIframe" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script type="module" src="js/watch.js"></script>

    <footer class="main-footer">
    <div class="footer-content">
        <p>&copy; 2026 Duc <span class="heart">💖</span> Ngoc. All rights reserved.</p>
    </div>
    </footer>

</body>
</html>
