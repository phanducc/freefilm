<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm - Đang Xem Phim</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* =========================================
           CSS BỔ SUNG RIÊNG CHO TRANG XEM PHIM
           ========================================= */
        .watch-container { max-width: 1200px; margin: 0 auto; padding: 100px 20px 50px 20px; width: 100%; }
        /* CSS Tìm Kiếm trên watch.html */
        .search-active { width: 400px !important; }
        .search-active .search-overlay { width: calc(100% - 50px) !important; opacity: 1 !important; pointer-events: auto !important; }
        .search-active .nav-links { opacity: 0 !important; pointer-events: none !important; }
        /* Khung Player */
        .player-wrapper { 
            aspect-ratio: 16/9; background: #000; border-radius: 20px; 
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
            position: relative;
        }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; position: relative; z-index: 2;}
        .iframe-fallback { position: absolute; top:0; left:0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #888; z-index: 1;}
        
        /* Thanh nút điều khiển Glassmorphism */
        .controls-bar { 
            display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; 
            flex-wrap: wrap; background: rgba(13, 13, 18, 0.6); 
            backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .control-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 10px 20px; border-radius: 30px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .control-btn:hover:not(:disabled) { background: #fff; color: #111; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Tiêu đề các mục */
        .section-heading { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 15px; border-left: 4px solid #fff; padding-left: 10px; }
        
        /* Khung chứa các mục (Thông tin, Tập phim) */
        .glass-panel { 
            background: rgba(20, 25, 30, 0.6); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; 
            padding: 25px; margin-bottom: 30px; 
        }

        /* Nút tập phim */
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .ep-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 10px; border-radius: 12px; cursor: pointer; 
            text-align: center; font-weight: 600; transition: 0.3s; font-size: 14px;
        }
        .ep-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .ep-btn.active { background: #fff; color: #111; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4); }

        /* Thông tin phim */
        .movie-title-large { font-size: 32px; font-weight: 800; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .movie-meta-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; color: #ccc; font-size: 14px;}
        .movie-meta-info span { color: #fff; font-weight: 700; margin-right: 5px; }
        .movie-desc { color: #aaa; line-height: 1.6; margin-top: 15px; font-size: 15px; }

        /* Diễn viên */
        .actors-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .actor-card { text-align: center; }
        .actor-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 8px; }
        .actor-name { color: #eee; font-size: 13px; font-weight: 600; }

        /* =========================================
           POPUP TRAILER (MODAL)
           ========================================= */
        .trailer-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s ease;
        }
        .trailer-modal.show { opacity: 1; pointer-events: auto; }
        .trailer-content {
            width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000;
            border-radius: 16px; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .trailer-content iframe { width: 100%; height: 100%; border-radius: 16px; border: none; }
        .close-trailer-btn {
            position: absolute; top: -45px; right: -10px; background: transparent;
            border: none; color: #fff; font-size: 30px; cursor: pointer;
            transition: 0.3s; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .close-trailer-btn:hover { color: #ff4500; transform: scale(1.1); }

        /* Reponsive Mobile */
        @media (max-width: 768px) {
            .watch-container { padding-top: 80px; }
            .control-btn { padding: 8px 12px; font-size: 12px; }
            .movie-title-large { font-size: 24px; }
            .close-trailer-btn { right: 0; top: -40px; }
        }
        /* Lưới 6 phim gợi ý thẳng hàng */
        .related-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        @media (max-width: 1024px) { .related-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .related-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    
<header class="glass-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FreeFilm" onerror="this.outerHTML='<span class=\'logo-text\'>FREEFILM</span>'">
            </a>
            
            <div class="nav-pill-container" id="navPillContainer" style="height: 50px; overflow: hidden; position: relative; display: flex; align-items: center; background: rgba(13, 13, 18, 0.85); backdrop-filter: blur(20px); border-radius: 50px; padding: 6px 6px 6px 20px; transition: all 0.4s ease;">
                
                <nav class="nav-links" id="navLinks" style="display: flex; gap: 15px; transition: opacity 0.3s; margin: 0;">
                    <span class="nav-item" style="color:#aaa; cursor:pointer; font-weight:600; font-size:15px;" onclick="window.location.href='index.html'">Phim Bộ</span>
                    <span class="nav-item" style="color:#aaa; cursor:pointer; font-weight:600; font-size:15px;" onclick="window.location.href='index.html'">Phim Lẻ</span>
                    <span class="nav-item" style="color:#aaa; cursor:pointer; font-weight:600; font-size:15px;" onclick="window.location.href='index.html'">Hoạt Hình</span>
                    <span class="nav-item" style="color:#aaa; cursor:pointer; font-weight:600; font-size:15px;" onclick="window.location.href='index.html'">TV Shows</span>
                </nav>
                
<div class="search-overlay" id="searchOverlay" style="position: absolute; right: 50px; top: 0; height: 100%; display: flex; align-items: center; justify-content: space-between; width: 0; opacity: 0; pointer-events: none; transition: width 0.4s ease, opacity 0.3s; overflow: hidden; background: rgba(20, 25, 30, 0.95); border-radius: 50px;">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim..." style="flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 0 20px; font-size: 15px; width: 100%;">
                    <button id="closeSearch" style="background: transparent; border: none; color: #aaa; cursor: pointer; padding: 5px 20px 5px 10px; font-size: 18px; flex-shrink: 0; transition: 0.3s;">✕</button>
                </div>
                <button id="searchBtn" style="width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: auto; transition: 0.3s;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            
            <div class="header-right"></div>
        </div>
    </header>

    <main class="watch-container">
        
        <div class="player-wrapper">
            <div class="iframe-fallback">Đang kết nối tới máy chủ Video...</div>
            <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="btnPrevEp">⏮️ Tập trước</button>
            <button class="control-btn" id="btnTrailer">🎦 Xem Trailer</button>
            <button class="control-btn" id="btnReload">🔁 Load lại</button>
            <button class="control-btn" id="btnNextEp">⏭️ Tập sau</button>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">▶️ Danh Sách Tập</h3>
            <div class="episodes-section" id="serverSection" style="display: none; margin-bottom: 15px;">
                <div id="serverList" style="display: flex; gap: 10px; margin-bottom: 15px;"></div>
            </div>
            <div id="episodeList" class="episodes-grid">
                <span style="color:#aaa;">Đang tải danh sách tập...</span>
            </div>
        </div>

        <div class="glass-panel">
            <h1 id="movieTitle" class="movie-title-large">Đang tải thông tin...</h1>
            <p id="movieTmdbScore" style="color: #f5c518; font-weight: 700; font-size: 16px;"></p>
            
            <div class="movie-meta-info" id="movieMetaInfo">
                </div>
            <div id="movieDesc" class="movie-desc"></div>
        </div>

        <div class="glass-panel">
            <h3 class="section-heading">🎭 Diễn viên</h3>
            <div id="actorsList" class="actors-list">
                <span style="color:#aaa;">Đang tải diễn viên...</span>
            </div>
        </div>

<div class="recommended-section" style="margin-top: 40px;">
            <h3 class="section-heading">🔥 Có thể bạn sẽ thích</h3>
            <div id="relatedMoviesGrid" style="display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 15px; width: 100%;">
                <span style="color:#aaa;">Đang tải gợi ý...</span>
            </div>
        </div>
        </main>

    <div id="trailerModal" class="trailer-modal">
        <div class="trailer-content">
            <button id="closeTrailerBtn" class="close-trailer-btn">❌</button>
            <iframe id="trailerIframe" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');
        const options = { method: 'GET', headers: { accept: 'application/json' } };
        
        const iframePlayer = document.getElementById('iframePlayer');
        const episodeListDiv = document.getElementById('episodeList');
        const serverListDiv = document.getElementById('serverList');
        // --- XỬ LÝ THANH TÌM KIẾM BẬT RA ---
        const searchBtn = document.getElementById('searchBtn');
        const closeSearch = document.getElementById('closeSearch');
        const navPillContainer = document.getElementById('navPillContainer');
        const searchInput = document.getElementById('searchInput');

        searchBtn.onclick = () => {
            navPillContainer.classList.add('search-active');
            searchInput.focus();
        };

        closeSearch.onclick = () => {
            navPillContainer.classList.remove('search-active');
            searchInput.value = '';
        };

        searchInput.onkeypress = (e) => { 
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    // Chuyển hướng về trang chủ và "gửi kèm" từ khóa tìm kiếm
                    window.location.href = `index.html?search=${encodeURIComponent(query)}`;
                }
            } 
        };
        let currentEpList = [], currentEpIndex = 0, movieTrailerUrl = '';

        // --- XỬ LÝ TRAILER MODAL ---
        const trailerModal = document.getElementById('trailerModal');
        const trailerIframe = document.getElementById('trailerIframe');
        
        document.getElementById('btnTrailer').onclick = () => {
            if (movieTrailerUrl) {
                let embedUrl = movieTrailerUrl;
                if (embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                embedUrl += (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                trailerIframe.src = embedUrl;
                trailerModal.classList.add('show');
            } else {
                alert('Phim này chưa có Trailer!');
            }
        };

        // Tắt Trailer và DỪNG VIDEO
        document.getElementById('closeTrailerBtn').onclick = () => {
            trailerModal.classList.remove('show');
            trailerIframe.src = ''; // Ép iframe rỗng để ngừng phát video ngầm
        };

        // --- ĐIỀU KHIỂN VIDEO ---
        function playVideo(index, buttonEl) {
            currentEpIndex = index;
            iframePlayer.src = currentEpList[index].link_embed;
            
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            if(buttonEl) buttonEl.classList.add('active');
            
            localStorage.setItem(`ff_history_${slug}`, currentEpList[index].link_embed);

            document.getElementById('btnPrevEp').disabled = (index === 0);
            document.getElementById('btnNextEp').disabled = (index === currentEpList.length - 1);
        }

        document.getElementById('btnPrevEp').onclick = () => { if(currentEpIndex > 0) playVideo(currentEpIndex - 1, episodeListDiv.children[currentEpIndex - 1]); };
        document.getElementById('btnNextEp').onclick = () => { if(currentEpIndex < currentEpList.length - 1) playVideo(currentEpIndex + 1, episodeListDiv.children[currentEpIndex + 1]); };
        document.getElementById('btnReload').onclick = () => { iframePlayer.src = iframePlayer.src; };

// --- FETCH PHIM ĐỀ CỬ (Chuẩn form thẻ phim trang chủ) ---
        async function fetchRelatedMovies(catSlug) {
            try {
                const res = await fetch(`https://ophim1.com/v1/api/the-loai/${catSlug}?page=1`, options).then(r => r.json());
                let items = res.data?.items || res.items || [];
                const relatedGrid = document.getElementById('relatedMoviesGrid');
                relatedGrid.innerHTML = '';
                
                // Lọc bỏ phim đang xem, xáo trộn ngẫu nhiên và cắt lấy đúng 6 phim
                let related = items.filter(m => m.slug !== slug);
                related = related.sort(() => 0.5 - Math.random()).slice(0, 6);
                
                let imgDomain = (res.data?.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');
                
                related.forEach(movie => {
                    const card = document.createElement('div');
                    // Sử dụng chung class ff-card của trang chủ để hưởng sái CSS
                    card.className = 'ff-card'; 
                    card.style.background = 'transparent';
                    card.style.padding = '0'; // Tắt padding để ảnh sát lề
                    card.onclick = () => window.location.href = `watch.html?slug=${movie.slug}`;

                    let rawScore = (movie.imdb && movie.imdb.vote_average) ? parseFloat(movie.imdb.vote_average) : ((movie.tmdb && movie.tmdb.vote_average) ? parseFloat(movie.tmdb.vote_average) : 0);
                    let displayScore = (rawScore > 0) ? rawScore.toFixed(1) : 'N/A';
                    let typeText = movie.type === 'series' ? 'Phim Bộ' : 'Phim Lẻ';

                    let thumb = movie.thumb_url || movie.poster_url || '';
                    if (!thumb.startsWith('http')) {
                        if (!thumb.includes('uploads/movies/')) thumb = '/uploads/movies/' + thumb.replace(/^\//, '');
                        else if (!thumb.startsWith('/')) thumb = '/' + thumb;
                        thumb = imgDomain + thumb;
                    }

                    // Áp dụng ép dòng tiêu đề (white-space: nowrap) giống hệt trang chủ
                    card.innerHTML = `
                        <div class="thumb-wrapper" style="overflow: hidden; border-radius: 16px; margin-bottom: 12px; aspect-ratio: 2/3; width: 100%;">
                            <img src="${thumb}" class="movie-thumb" alt="${movie.name}" style="width: 100%; height: 100%; object-fit: cover; transition: 0.4s;">
                        </div>
                        <h3 class="movie-title" style="font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px;">${movie.name}</h3>
                        <div class="movie-meta" style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #d0d8e0; font-weight: 600;">
                            <span class="movie-score" style="color: #f5c518;">★ ${displayScore}</span>
                            <span class="movie-type-badge" style="background: rgba(255, 255, 255, 0.1); padding: 2px 8px; border-radius: 6px; font-size: 11px; color: #fff;">${typeText}</span>
                        </div>
                    `;
                    relatedGrid.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }
        
        // --- FETCH DỮ LIỆU CHI TIẾT ---
        async function fetchDetail() {
            if (!slug) { document.getElementById('movieTitle').innerText = "Lỗi đường dẫn!"; return; }
            try {
                const resPhim = await fetch(`https://ophim1.com/v1/api/phim/${slug}`, options).then(r => r.json());
                const dataObj = resPhim.data || resPhim;
                const movie = dataObj.item || dataObj.movie;

                if (movie) {
                    document.title = `Đang xem: ${movie.name}`;
                    document.getElementById('movieTitle').innerText = movie.name;
                    movieTrailerUrl = movie.trailer_url || '';

                    // Điểm
                    let rawScore = (movie.imdb && movie.imdb.vote_average) ? parseFloat(movie.imdb.vote_average) : ((movie.tmdb && movie.tmdb.vote_average) ? parseFloat(movie.tmdb.vote_average) : 0);
                    document.getElementById('movieTmdbScore').innerText = `⭐ Điểm đánh giá: ${(rawScore > 0) ? rawScore.toFixed(1) : 'Chưa có'}`;

                    // Meta Info
                    document.getElementById('movieMetaInfo').innerHTML = `
                        <div><span>🎬 Đạo diễn:</span> ${movie.director?.[0] || 'Đang cập nhật'}</div>
                        <div><span>🌍 Quốc gia:</span> ${movie.country?.[0]?.name || 'Đang cập nhật'}</div>
                        <div><span>📅 Phát hành:</span> ${movie.year || 'Đang cập nhật'}</div>
                        <div><span>⏳ Thời lượng:</span> ${movie.time || 'Đang cập nhật'}</div>
                        <div><span>📺 Tiến độ:</span> ${movie.episode_current || '?'} / ${movie.episode_total || '?'}</div>
                        <div><span>✨ Định dạng:</span> ${movie.quality || ''} ${movie.lang ? '- ' + movie.lang : ''}</div>
                    `;
                    document.getElementById('movieDesc').innerHTML = movie.content || "Chưa có mô tả chi tiết.";

                    // Episodes
                    const episodesArray = movie.episodes || resPhim.episodes;
                    if (!episodesArray || episodesArray.length === 0) { 
                        episodeListDiv.innerHTML = '<p>Chưa cập nhật link xem.</p>'; 
                    } else {
                        function renderEpisodes(serverIndex) {
                            episodeListDiv.innerHTML = '';
                            currentEpList = episodesArray[serverIndex].server_data || [];
                            const savedEp = localStorage.getItem(`ff_history_${slug}`);
                            let hasPlayed = false;

                            currentEpList.forEach((tap, i) => {
                                const btn = document.createElement('button');
                                btn.className = 'ep-btn'; btn.innerText = tap.name || `Tập ${i + 1}`;
                                btn.onclick = () => { playVideo(i, btn); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                                episodeListDiv.appendChild(btn);

                                if (savedEp && tap.link_embed === savedEp || !savedEp && i === 0) {
                                    if(!hasPlayed) { playVideo(i, btn); hasPlayed = true; }
                                }
                            });
                        }

                        document.getElementById('serverSection').style.display = 'block';
                        episodesArray.forEach((server, i) => {
                            const btn = document.createElement('button');
                            btn.className = 'ep-btn'; btn.innerText = server.server_name || `Server ${i + 1}`;
                            btn.onclick = () => {
                                serverListDiv.querySelectorAll('button').forEach(b => b.style.background = 'rgba(255,255,255,0.05)');
                                btn.style.background = '#fff'; btn.style.color = '#111';
                                renderEpisodes(i);
                            };
                            serverListDiv.appendChild(btn);
                            if(i===0) btn.click();
                        });
                    }

                    // Gọi phim gợi ý
                    if(movie.category && movie.category.length > 0) fetchRelatedMovies(movie.category[0].slug);

                    // Diễn viên
                    const resPeoples = await fetch(`https://ophim1.com/v1/api/phim/${slug}/peoples`, options).then(r => r.json()).catch(()=>null);
                    const actorsList = document.getElementById('actorsList');
                    actorsList.innerHTML = '';
                    if (resPeoples?.data?.peoples?.length > 0) {
                        resPeoples.data.peoples.slice(0, 12).forEach(actor => {
                            actorsList.innerHTML += `
                                <div class="actor-card">
                                    ${actor.profile_path ? `<img src="https://image.tmdb.org/t/p/w185${actor.profile_path}" class="actor-img">` : `<div class="actor-img" style="display:flex; align-items:center; justify-content:center; font-size: 30px; background:#333;">👯</div>`}
                                    <div class="actor-name">${actor.name}</div>
                                </div>
                            `;
                        });
                    } else { actorsList.innerHTML = '<span style="color:#aaa;">Đang cập nhật...</span>'; }
                }
            } catch (error) { console.error(error); }
        }

        fetchDetail();
    </script>
</body>
</html>
