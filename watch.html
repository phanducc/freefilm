<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFilm - Đang Xem Phim</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-icon" onclick="window.location.href='index.html'" title="Trang Chủ">🔥</div>
            <div class="sidebar-icon active" title="Đang Xem">▶️</div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="brand">
                    <a href="index.html" class="logo-link"><img src="logo.png" alt="FreeFilm Logo" class="logo-img"></a>
                </div>
                <div class="header-actions">
                    <button class="back-btn" onclick="window.location.href='index.html'">🔙 Quay Lại</button>
                </div>
            </header>

            <div class="content-wrapper watch-wrapper">
                <div class="player-container">
                    <iframe id="iframePlayer" allowfullscreen scrolling="no"></iframe>
                </div>

                <div class="movie-info-box">
                    <h2 id="movieTitle" class="movie-detail-title">Đang tải dữ liệu...</h2>
                    <p id="movieDesc" class="movie-desc"></p>
                </div>

                <div class="episodes-section">
                    <h3 class="section-subtitle">Danh Sách Tập</h3>
                    <div id="episodeList" class="episodes-grid"></div>
                </div>

                <div class="meta-section">
                    <h3 class="meta-title">🎭 Diễn viên</h3>
                    <div id="actorsList" class="actors-list"><span class="actor-tag">Đang tải...</span></div>
                </div>

                <div class="meta-section">
                    <h3 class="meta-title">🖼️ Hình ảnh</h3>
                    <div id="imagesGallery" class="images-gallery"><span class="actor-tag">Đang tải...</span></div>
                </div>

                <div class="meta-section">
                    <h3 class="meta-title">🏷️ Từ khóa</h3>
                    <div id="keywordsList" class="keywords-list"><span class="actor-tag">Đang tải...</span></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');
        const iframePlayer = document.getElementById('iframePlayer');
        const episodeListDiv = document.getElementById('episodeList');
        
        const actorsList = document.getElementById('actorsList');
        const imagesGallery = document.getElementById('imagesGallery');
        const keywordsList = document.getElementById('keywordsList');
        const options = { method: 'GET', headers: { accept: 'application/json' } };

        function playVideo(embedUrl, buttonEl) {
            iframePlayer.src = embedUrl;
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            if(buttonEl) buttonEl.classList.add('active');
            localStorage.setItem(`ff_history_${slug}`, embedUrl);
        }

        function createSafeNode(tag, className, text) {
            const el = document.createElement(tag);
            el.className = className;
            el.innerText = text;
            return el;
        }

        async function fetchDetail() {
            if (!slug) { document.getElementById('movieTitle').innerText = "Lỗi đường dẫn!"; return; }
            
            try {
                const [resPhim, resPeoples, resImages, resKeywords] = await Promise.all([
                    fetch(`https://ophim1.com/v1/api/phim/${slug}`, options).then(r => r.json()),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/peoples`, options).then(r => r.json()).catch(() => null),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/images`, options).then(r => r.json()).catch(() => null),
                    fetch(`https://ophim1.com/v1/api/phim/${slug}/keywords`, options).then(r => r.json()).catch(() => null)
                ]);

                const dataObj = resPhim.data || resPhim;
                const movie = dataObj.item || dataObj.movie;
                const episodesArray = movie.episodes || resPhim.episodes;
                let imgDomain = (dataObj.APP_DOMAIN_CDN_IMAGE || 'https://img.ophim.live').replace(/\/$/, '');

                if (movie) {
                    document.title = `Đang xem: ${movie.name}`;
                    document.getElementById('movieTitle').innerText = movie.name;
                    document.getElementById('movieDesc').innerHTML = movie.content || movie.description || "Chưa có mô tả chi tiết.";

                    if (!episodesArray || episodesArray.length === 0) { 
                        episodeListDiv.appendChild(createSafeNode('p', '', 'Chưa cập nhật link xem.')); 
                    } else {
                        const episodes = episodesArray[0].server_data || [];
                        if (episodes.length === 0) { 
                            episodeListDiv.appendChild(createSafeNode('p', '', 'Chưa có tập phim nào.')); 
                        } else {
                            const savedEpUrl = localStorage.getItem(`ff_history_${slug}`);
                            let hasPlayed = false;

                            episodes.forEach((tap, index) => {
                                const btn = createSafeNode('button', 'ep-btn', tap.name || `Tập ${index + 1}`);
                                btn.onclick = () => {
                                    playVideo(tap.link_embed, btn);
                                    window.scrollTo(0, 0);
                                };
                                episodeListDiv.appendChild(btn);

                                if (savedEpUrl && tap.link_embed === savedEpUrl) {
                                    playVideo(tap.link_embed, btn);
                                    hasPlayed = true;
                                } else if (!savedEpUrl && index === 0) {
                                    playVideo(tap.link_embed, btn);
                                    hasPlayed = true;
                                }
                            });

                            if (!hasPlayed && episodes.length > 0) {
                                playVideo(episodes[0].link_embed, episodeListDiv.firstChild);
                            }
                        }
                    }

                    // --- DIỄN VIÊN ---
                    actorsList.innerHTML = '';
                    if (movie.actor && movie.actor.length > 0 && movie.actor[0] !== "") {
                        movie.actor.forEach(a => actorsList.appendChild(createSafeNode('span', 'actor-tag', a)));
                    } else if (resPeoples && resPeoples.data && resPeoples.data.items && resPeoples.data.items.length > 0) {
                        resPeoples.data.items.forEach(a => actorsList.appendChild(createSafeNode('span', 'actor-tag', a.name)));
                    } else {
                        actorsList.appendChild(createSafeNode('span', 'actor-tag', 'Đang cập nhật...'));
                    }

                    // --- HÌNH ẢNH (MÁY QUÉT ĐA NĂNG) ---
                    imagesGallery.innerHTML = '';
                    let extractedImages = [];

                    // 1. Quét sâu vào API Images
                    if (resImages && resImages.data) {
                        const imgData = resImages.data.items || resImages.data.item || resImages.data || [];
                        if (Array.isArray(imgData)) {
                            imgData.forEach(img => {
                                // Lấy link dù nó giấu ở object nào
                                let link = img.url || img.link || img.file || (typeof img === 'string' ? img : null);
                                if (link) extractedImages.push(link);
                            });
                        }
                    }

                    // 2. Chế độ dự phòng (Nếu API phụ trống thì lấy luôn 2 ảnh chính của phim ra)
                    if (extractedImages.length === 0) {
                        if (movie.poster_url) extractedImages.push(movie.poster_url);
                        if (movie.thumb_url && movie.thumb_url !== movie.poster_url) extractedImages.push(movie.thumb_url);
                    }

                    // 3. Lọc bỏ link trùng lặp và link rỗng
                    extractedImages = [...new Set(extractedImages)].filter(url => url.trim() !== '');

                    if (extractedImages.length > 0) {
                        extractedImages.forEach(url => {
                            if (!url.startsWith('http')) {
                                if (!url.includes('uploads/movies/')) url = '/uploads/movies/' + url.replace(/^\//, '');
                                else if (!url.startsWith('/')) url = '/' + url;
                                url = imgDomain + url;
                            }
                            const imgEl = document.createElement('img');
                            imgEl.src = url; 
                            imgEl.className = 'gallery-img'; 
                            imgEl.alt = 'Cảnh phim';
                            imagesGallery.appendChild(imgEl);
                        });
                    } else {
                        imagesGallery.appendChild(createSafeNode('span', 'actor-tag', 'Chưa có hình ảnh.'));
                    }

                    // --- TỪ KHÓA ---
                    keywordsList.innerHTML = '';
                    if (resKeywords && resKeywords.data && resKeywords.data.items && resKeywords.data.items.length > 0) {
                        resKeywords.data.items.forEach(kw => keywordsList.appendChild(createSafeNode('span', 'keyword-tag', `#${kw.name}`)));
                    } else if (movie.category && movie.category.length > 0) {
                        movie.category.forEach(c => keywordsList.appendChild(createSafeNode('span', 'keyword-tag', `#${c.name}`)));
                    } else {
                        keywordsList.appendChild(createSafeNode('span', 'actor-tag', 'Chưa có từ khóa.'));
                    }

                } else { document.getElementById('movieTitle').innerText = "Không tìm thấy dữ liệu!"; }
            } catch (error) { 
                document.getElementById('movieTitle').innerText = "Lỗi máy chủ Ophim!"; 
                console.error(error);
            }
        }

        const playerContainer = document.querySelector('.player-container');
        playerContainer.insertAdjacentHTML('afterbegin', '<div class="iframe-fallback"><span>Đang tải video hoặc link máy chủ bị lỗi...</span></div>');
        
        fetchDetail();
    </script>
</body>
</html>
